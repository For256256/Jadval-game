<div class="theme-switch">
  <button class="theme-btn" id="themeBtn" type="button" aria-label="theme">
    <i data-lucide="monitor" id="themeIcon"></i>
  </button>
  <div class="theme-menu hidden" id="themeMenu">
    <button type="button" data-theme-choice="light"><i data-lucide="sun"></i><span data-i18n="theme.light">روشن</span></button>
    <button type="button" data-theme-choice="dark"><i data-lucide="moon"></i><span data-i18n="theme.dark">تاریک</span></button>
    <button type="button" data-theme-choice="auto"><i data-lucide="monitor"></i><span data-i18n="theme.auto">خودکار</span></button>
  </div>
</div>
