{% extends "base_marketing.html" %}

{% block title %}ورود | سازه‌مارکت{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="auth-card spot-card" data-reveal>
      <div class="auth-card-head">
        <span class="brand-mark auth-mark"><img src="{{ url_for('static', filename='img/logo.png') }}" alt="سازه‌مارکت" /></span>
        <h1 data-i18n="auth.login_title">ورود به حساب کاربری</h1>
        <p class="muted" data-i18n="auth.login_subtitle">برای دسترسی به پنل خریدار، فروشنده یا مدیریت وارد شوید.</p>
      </div>

      {% if error %}
      <div class="auth-alert">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('login', next=request.args.get('next')) }}" class="auth-form">
        <div class="field">
          <label data-i18n="auth.email_label">ایمیل</label>
          <input type="email" name="email" required autocomplete="email" value="{{ email or '' }}" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label data-i18n="auth.password_label">رمز عبور</label>
          <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" data-i18n="common.login">ورود</button>
      </form>

      <p class="auth-switch">
        <span data-i18n="auth.no_account">هنوز ثبت‌نام نکرده‌اید؟</span>
        <a href="{{ url_for('register') }}" data-i18n="common.signup">ثبت‌نام رایگان</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
